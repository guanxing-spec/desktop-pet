name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Clippy (deny unsafe)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D unsafe-code -D warnings
        working-directory: desktop-pet

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
        working-directory: desktop-pet

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: desktop-pet

      - name: TypeScript tests
        run: npm test
        working-directory: desktop-pet

      - name: Type check
        run: npx vue-tsc --noEmit
        working-directory: desktop-pet
